<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<style>
                    .btn-success {
                        background-color: rgb(18, 40, 247);
                    }

                    img {
                        border-radius: 30px;
                        width: 100px;
                        height: 100px;
                        display: block;
                        margin: 0 auto;
                    }

                    legend {
                        color: rgba(212, 61, 10, 0.242);

                    }

                    body {
                        font-family: Arial, Helvetica, sans-serif;
                        background-color: cornflowerblue;

                    }

                    fieldset {
                        font-family: 'Courier New', Courier, monospace;
                        font-style: italic;
                        font-size: larger;
                        text-align: left;
                        width: 500px;
                        display: block;
                        margin: 0 auto;
                    }
                    footer{
                        display: flex;
                        justify-content: right;
                    }
                </style>
</head>

<body>
    <main>
        <nav class="navbar navbar-expand-lg navbar-light bg-light">
            <div class="container-fluid">
                <a class="navbar-brand" href="#">
                    <h1>ENCUESTA DE SATISFACCION</h1>
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                    aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link active" aria-current="page" href="#">Home</a>
                        </li>
                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button"
                                data-bs-toggle="dropdown" aria-expanded="false">
                                Dropdown
                            </a>
                            <ul class="dropdown-menu" aria-labelledby="navbarDropdown">
                                <li><a class="dropdown-item" href="#">Action</a></li>
                                <li><a class="dropdown-item" href="#">Another action</a></li>
                                <li>
                                    <hr class="dropdown-divider">
                                </li>
                                <li><a class="dropdown-item" href="#">Something else here</a></li>
                            </ul>
                        </li>
                    </ul>
                    <form class="d-flex">
                        <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search">
                        <button class="btn btn-outline-success" type="submit">Search</button>
                    </form>
                </div>
            </div>
        </nav>
        <div>

            <fieldset>
                <legend>Datos</legend>
                <br>
                <div class="input-group mb-3">
                    <span class="input-group-text" id="basic-addon1">Nombre completo</span>
                    <input type="text" class="form-control" placeholder="Nombre completo" aria-label="Username"
                        aria-describedby="basic-addon1">
                </div>

                <div class="input-group mb-3">
                    <span class="input-group-text" id="basic-addon2">Email</span>
                    <input type="text" class="form-control" placeholder="Email" aria-label="Recipients username"
                        aria-describedby="basic-addon2">
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="flexRadioDefault" id="flexRadioDefault1">
                    <label class="form-check-label" for="flexRadioDefault1">
                        SI
                    </label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="flexRadioDefault" id="flexRadioDefault2" checked>
                    <label class="form-check-label" for="flexRadioDefault2">
                        NO
                    </label>
                </div>
                <br><br>
                <div class="input-group">
                    <span class="input-group-text">Comentarios</span>
                    <textarea class="form-control" aria-label="With textarea"></textarea>
                </div>
                <br>
            </fieldset>
            <br>
            <div class="d-flex justify-content-center">
                <button type="button" class="btn btn-success" id="Enviar">Enviar</button>
            </div>
            <br>
            <div>
                <img src="Nueva carpeta/giphy.gif" alt="idea" srcset="">
            </div>

    </main>

    <script src="Nueva carpeta/java.js"></script>

<footer>
    <button onclick="myfuntion()" class="btn btn-primary">ir arriba</button>
</footer>
</body>

</html>
