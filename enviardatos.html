<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"

</head>

                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link active" aria-current="page" href="#">Home</a>
                        </li>
                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button"

                                Dropdown
                            </a>
                            <ul class="dropdown-menu" aria-labelledby="navbarDropdown">
                                <li><a class="dropdown-item" href="#">Action</a></li>

                                <li>
                                    <hr class="dropdown-divider">
                                </li>
                                <li><a class="dropdown-item" href="#">Something else here</a></li>
                            </ul>

                    <form class="d-flex">
                        <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search">
                        <button class="btn btn-outline-success" type="submit">Search</button>
                    </form>
                </div>
            </div>
        </nav>
        <fieldset>
            <legend>Datos</legend>
            <br>
            <div>
                <div class="mb-3">
                    <label for="exampleInputEmail1" class="form-label">Nombre Completo</label>
                    <input type="email" class="form-control" id="Nombre" aria-describedby="emailHelp" placeholder="Nombre completo">
                </div>
                <div class="mb-3">
                    <label for="exampleInputEmail1" class="form-label">Email address</label>
                    <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp" placeholder="Email">
                    <br>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="flexRadioDefault" id="flexRadioDefault1">
                        <label class="form-check-label" for="flexRadioDefault1">
                            SI
                        </label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="flexRadioDefault" id="flexRadioDefault2"
                            checked>
                        <label class="form-check-label" for="flexRadioDefault2">
                            NO
                        </label>
                    </div>
                    <br>
                    <div class="input-group">
                        <span class="input-group-text">Comentarios</span>
                        <textarea class="form-control" aria-label="With textarea"></textarea>
                    </div>
                    <br>
                    <div class="d-flex justify-content-center">

                    </div>
                    <br>
                    <img src="Nueva carpeta/giphy.gif" alt="idea" srcset="">

    <style>
        .btn-success {
            background-color: rgb(18, 40, 247);
        }

        img {
            border-radius: 30px;
            width: 100px;
            height: 100px;
            display: block;
            margin: 0 auto;
        }

        body {
            background-color: cornflowerblue;
        }

        fieldset {
            font-family: 'Courier New', Courier, monospace;
            font-style: italic;
            font-size: larger;
            text-align: left;
            width: 500px;
            display: block;
            margin: 0 auto;
        }
    </style>

        const boton = document.getElementById('Enviar');

        boton.addEventListener('click', function () {
            alert('Encuesta enviada');
            boton.style.backgroundColor = ' rgb(18, 40, 247)'; // Cambiar estilo
            boton.innerText = 'Enviar';
        });
        const nombre = document.getElementById("Nombre").value;
    </script>
